<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />

    <title>Minh & Thùy — 15.03.2026</title>

    <!-- SEO cơ bản -->
    <meta
      name="description"
      content="Thiệp cưới online của Công Minh & Thanh Thùy — 15.03.2026. Mời bạn cùng xem câu chuyện tình yêu và thông tin lễ cưới của chúng mình."
    />

    <!-- Open Graph / khi share lên Facebook, Zalo... -->
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="vi_VN" />
    <!-- TODO: thay YOUR_DOMAIN_HERE bằng domain thật, ví dụ https://minhthuywedding.com -->
    <meta property="og:url" content="https://minhthuywedding.com" />
    <meta
      property="og:title"
      content="Thiệp cưới Công Minh & Thanh Thùy — 15.03.2026"
    />
    <meta
      property="og:description"
      content="Mở thiệp cưới online để xem hành trình yêu, bộ ảnh cưới và thông tin lễ cưới của Công Minh & Thanh Thùy."
    />
    <!-- Dùng ảnh đứng dưới cổng hoa làm ảnh share -->
    <!-- NÊN dùng URL tuyệt đối để mạng xã hội đọc được đúng ảnh -->
    <meta
      property="og:image"
      content="https://minhthuywedding.com/images/hero-4.jpg"
    />

    <!-- Twitter Card (một số nền tảng khác cũng dùng) -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Thiệp cưới Công Minh & Thanh Thùy — 15.03.2026"
    />
    <meta
      name="twitter:description"
      content="Mời bạn đến chung vui trong ngày cưới của chúng mình."
    />
    <meta
      name="twitter:image"
      content="https://YOUR_DOMAIN_HERE/images/hero-4.jpg"
    />

    <link rel="icon" type="image/jpeg" href="/images/hero-4.jpg" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Preload ảnh hero đầu tiên -->
    <link rel="preload" as="image" href="/images/hero-4.jpg" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
